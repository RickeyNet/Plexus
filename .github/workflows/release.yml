name: Release Automation

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to validate and publish (for example v0.2.0)"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Resolve release tag
        id: release
        env:
          # Passed via env rather than interpolated into the script so a
          # crafted dispatch input cannot inject shell commands.
          DISPATCH_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            raw="${DISPATCH_TAG}"
          else
            raw="${GITHUB_REF_NAME}"
          fi
          # Strip leading 'v' so PLEXUS_VERSION matches _FALLBACK_VERSION format
          # (1.2.3, not v1.2.3) - the tag itself is kept for image tagging.
          version="${raw#v}"
          echo "tag=${raw}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Validate version and changelog consistency
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: python tools/check_release_consistency.py "${RELEASE_TAG}"

      - name: Set lowercase image name
        id: image
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ steps.release.outputs.tag }}
            type=raw,value=latest

      # Multi-platform builds cannot be loaded into the local daemon, so scan
      # a single-platform build first; its layers stay in the buildx cache and
      # are reused by the publish step below.
      - name: Build image for vulnerability scan (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: ${{ steps.image.outputs.name }}:scan
          build-args: |
            PLEXUS_VERSION=${{ steps.release.outputs.version }}
            PLEXUS_GIT_SHA=${{ steps.release.outputs.sha }}

      - name: Scan image (trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.name }}:scan
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PLEXUS_VERSION=${{ steps.release.outputs.version }}
            PLEXUS_GIT_SHA=${{ steps.release.outputs.sha }}
