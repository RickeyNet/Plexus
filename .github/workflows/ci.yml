name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy netcontrol templates Firewall_converter

      - name: Security audit (pip-audit)
        run: pip-audit --progress-spinner off

      - name: Static security checks (bandit)
        run: bandit -q -r netcontrol routes Firewall_converter templates -ll -ii

      - name: Tests with coverage gate
        run: pytest --cov=netcontrol --cov=routes --cov-report=term-missing --cov-fail-under=49
