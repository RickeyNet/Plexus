name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy netcontrol templates Firewall_converter

      - name: Security audit (pip-audit)
        run: pip-audit --progress-spinner off

      - name: Generate SBOM (CycloneDX)
        run: pip-audit -r requirements-lock.txt -f cyclonedx-json -o sbom.cdx.json --progress-spinner off --no-deps

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx-py${{ matrix.python-version }}
          path: sbom.cdx.json

      - name: Static security checks (bandit)
        run: bandit -q -r netcontrol routes Firewall_converter templates -ll -ii

      - name: Tests with coverage gate
        run: pytest --cov=netcontrol --cov=routes --cov-report=term-missing --cov-report=json:coverage.json --cov-fail-under=49

      - name: Critical module regression gate
        run: python tools/coverage_gate.py coverage.json

  postgres-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: plexus
          POSTGRES_USER: plexus
          POSTGRES_PASSWORD: plexus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U plexus -d plexus"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_DB_ENGINE: postgres
      APP_DATABASE_URL: postgresql://plexus:plexus@localhost:5432/plexus

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Postgres backend smoke tests
        run: pytest tests/test_postgres_backend.py -q
