name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy netcontrol templates

      - name: Security audit (pip-audit)
        run: pip-audit --progress-spinner off

      - name: Generate SBOM (CycloneDX)
        run: pip-audit -r requirements-lock.txt -f cyclonedx-json -o sbom.cdx.json --progress-spinner off --no-deps

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx-py${{ matrix.python-version }}
          path: sbom.cdx.json

      - name: Dependency vulnerability scan (safety)
        run: safety scan --output text

      - name: Static security checks (bandit)
        run: bandit -q -r netcontrol routes templates -ll -ii

      - name: Tests with coverage gate
        run: pytest --cov=netcontrol --cov=routes --cov-report=term-missing --cov-report=json:coverage.json --cov-fail-under=30

      - name: Critical module regression gate
        run: python tools/coverage_gate.py coverage.json

  postgres-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          # CI-only ephemeral credentials - not used in any deployed environment
          POSTGRES_DB: plexus
          POSTGRES_USER: plexus
          POSTGRES_PASSWORD: plexus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U plexus -d plexus"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_DB_ENGINE: postgres
      APP_DATABASE_URL: postgresql://plexus:plexus@localhost:5432/plexus

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Postgres backend smoke tests
        run: pytest tests/test_postgres_backend.py -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: netcontrol/static/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: netcontrol/static/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit (npm audit)
        run: npm audit --audit-level=high

      - name: Lint (eslint)
        run: npm run lint

      - name: Type check (tsc --noEmit)
        run: npm run typecheck

      - name: Tests (vitest)
        run: npm test

      - name: Build (vite)
        run: npm run build
