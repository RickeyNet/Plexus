<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Switch icon: circle with 2 horizontal arrows pointing inward -->
  <circle cx="32" cy="32" r="22" stroke="#42a5f5" stroke-width="3" fill="#0d47a1"/>
  <circle cx="32" cy="32" r="6" fill="#42a5f5"/>
  <!-- Left arrow pointing right (inward) -->
  <line x1="10" y1="32" x2="22" y2="32" stroke="#42a5f5" stroke-width="2.5"/>
  <polygon points="20,28 26,32 20,36" fill="#42a5f5"/>
  <!-- Right arrow pointing left (inward) -->
  <line x1="42" y1="32" x2="54" y2="32" stroke="#42a5f5" stroke-width="2.5"/>
  <polygon points="44,28 38,32 44,36" fill="#42a5f5"/>
</svg>
