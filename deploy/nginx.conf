# Map for WebSocket upgrade. nginx needs Connection: upgrade only when the
# client sends Upgrade: websocket - for plain HTTP requests we keep the
# default keep-alive behavior so SSE / chunked responses are not interfered
# with.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # nginx default is 1 MiB. IOS-XE / NX-OS / firewall images are typically
    # 400 MB to >1 GB - match the app's PLEXUS_MAX_IMAGE_UPLOAD_MB ceiling
    # (2 GiB) so the app, not nginx, decides the limit.
    client_max_body_size 2048m;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # WebSocket endpoints - must forward Upgrade/Connection so FastAPI's
    # WebSocket routes resolve. Lives in its own location block because the
    # connection-upgrade dance interferes with plain HTTP keep-alive.
    location /ws/ {
        proxy_pass http://plexus:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Everything else - HTTP API + static SPA assets.
    location / {
        proxy_pass http://plexus:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / chunked streaming support.
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}
