version: "3.9"

services:
  plexus:
    build: .
    container_name: plexus-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - plexus-data:/app/netcontrol/converter_sessions
      - plexus-db:/app/routes
      - plexus-certs:/app/certs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  plexus-data:
  plexus-db:
  plexus-certs:
