version: "3.9"

services:
  plexus:
    build: .
    env_file:
      - .env
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/docs')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
