[mypy]
python_version = 3.11
ignore_missing_imports = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_unused_configs = True
exclude = (?x)(^Firewall_converter/|^templates/playbooks/|^netcontrol/converter_sessions/)

[mypy-templates.*]
follow_imports = normal

[mypy-netcontrol.*]
follow_imports = normal

[mypy-netcontrol.app]
ignore_errors = True

[mypy-routes.database]
ignore_errors = True

[mypy-routes.runner]
ignore_errors = True

[mypy-routes.seed]
ignore_errors = True

[mypy-templates.run]
ignore_errors = True

[mypy-Firewall_converter.FortiGateToFTDTool.*]
ignore_errors = True

[mypy-netcontrol.routes.state]
ignore_errors = True

[mypy-netcontrol.routes.monitoring]
ignore_errors = True

[mypy-netcontrol.routes.auth]
ignore_errors = True

[mypy-netcontrol.routes.risk_analysis]
ignore_errors = True

[mypy-netcontrol.routes.playbooks]
ignore_errors = True

[mypy-netcontrol.routes.inventory]
ignore_errors = True

[mypy-netcontrol.routes.templates]
ignore_errors = True

[mypy-netcontrol.routes.admin]
ignore_errors = True

[mypy-netcontrol.routes.snmp]
ignore_errors = True

[mypy-netcontrol.routes.config_backups]
ignore_errors = True

[mypy-netcontrol.routes.jobs]
ignore_errors = True

[mypy-netcontrol.routes.config_drift]
ignore_errors = True

[mypy-routes.ansible_runner_backend]
ignore_errors = True
