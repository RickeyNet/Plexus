[mypy]
python_version = 3.11
ignore_missing_imports = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_unused_configs = True
exclude = (?x)(^Firewall_converter/|^templates/playbooks/|^netcontrol/converter_sessions/)

[mypy-templates.*]
follow_imports = normal

[mypy-netcontrol.*]
follow_imports = normal

[mypy-netcontrol.app]
ignore_errors = True

[mypy-routes.database]
ignore_errors = True

[mypy-routes.runner]
ignore_errors = True

[mypy-routes.seed]
ignore_errors = True

[mypy-templates.run]
ignore_errors = True

[mypy-Firewall_converter.FortiGateToFTDTool.*]
ignore_errors = True
